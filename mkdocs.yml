site_name: Kelemen László Ádám
site_url: https://iamlaszlokelemen.hu
theme:
  name: material
  language: hu
  icon:
    logo: fontawesome/solid/code-branch
  features:
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - header.autohide
    - announce.dismiss
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest

  plugins:
    - typeset
    - search
  palette:
    # Palette toggle for dark mode
    - scheme: slate
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Világos módra váltás
    # Palette toggle for light mode
    - scheme: default
      primary: blue
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Sötét módra váltás

  markdown_extensions:
    - admonition
    - pymdownx.details
    - pymdownx.superfences
    - attr_list
    - pymdownx.emoji:
        emoji_index: pymdownx.emoji.gemoji
        emoji_generator: pymdownx.emoji.to_svg
    - toc:
      permalink: true

copyright: Copyright &copy; 2024 Kelemen László Ádám

extra:
  generator: false
  social:
    - icon: fontawesome/brands/youtube
      link: https://youtube.com/@kela910512
    - icon: fontawesome/brands/github
      link: https://github.com/kela910512
    - icon: fontawesome/brands/linkedin
      link: https://iamlaszlokelemen.hu
